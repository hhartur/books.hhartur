<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>books.hhartur — entrar</title>
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ededed' stroke-width='2'><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>" />
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        books.hhartur
      </div>

      <div id="alert" class="alert alert-error hidden"></div>

      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">Usuário</label>
          <input
            class="form-input mono"
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            placeholder="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <div style="position:relative;">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            />
            <button type="button" id="togglePwd" class="btn btn-icon btn-ghost btn-sm" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);border:none;">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-full" id="submitBtn" style="margin-top:4px;">
          <span id="btnText">Entrar</span>
          <span id="btnSpinner" class="spinner hidden"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
